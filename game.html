<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mini dodge game with leaderboard">
  <title>Game — Portfolio</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Portfolio</a>
      <ul class="nav-links">
        <li><a href="index.html">About</a></li>
        <li><a href="timeline.html">Timeline</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="guestbook.html">Guestbook</a></li>
        <li><a href="game.html">Game</a></li>
        <li><button class="theme-toggle" aria-label="Toggle theme">🌙</button></li>
      </ul>
      <button class="nav-menu-btn" aria-label="Open menu" aria-expanded="false">
        <svg viewBox="0 0 24 24">
          <line x1="4" y1="7" x2="20" y2="7"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="17" x2="20" y2="17"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="page-header">
      <h1>Dodge</h1>
      <p>떨어지는 블록을 피하세요. ← → 키 또는 화면 좌/우 터치로 이동.</p>
    </div>

    <div class="game-container">
      <canvas id="game-canvas" width="400" height="600"></canvas>
      <div id="game-hud">
        <span>Score</span>
        <span id="score">0</span>
      </div>
      <div id="game-overlay">
        <div id="game-start" class="game-panel">
          <h2>Dodge!</h2>
          <p>Space 또는 Start 버튼으로 시작</p>
          <button id="start-btn" class="game-btn">Start</button>
        </div>
        <div id="game-over" class="game-panel" hidden>
          <h2>Game Over</h2>
          <p class="final-score-label">Your Score</p>
          <p class="final-score"><span id="final-score">0</span></p>
          <input type="text" id="player-name" placeholder="이름 (최대 10자)" maxlength="10">
          <div class="game-btn-row">
            <button id="submit-score" class="game-btn">Submit</button>
            <button id="restart-btn" class="game-btn secondary">Play Again</button>
          </div>
          <p id="submit-status" class="submit-status"></p>
        </div>
      </div>
    </div>

    <section class="leaderboard">
      <h2>Leaderboard</h2>
      <ol id="leaderboard-list">
        <li class="leaderboard-empty">Loading...</li>
      </ol>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner"></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
