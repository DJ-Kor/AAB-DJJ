  <!-- Main Content -->

    <div class="page-header">
      <h1>Guestbook</h1>
      <p>방명록을 남겨주세요 — GitHub 계정으로 로그인하면 댓글을 작성할 수 있습니다</p>
    </div>
    <div class="giscus-container">
      <!--
        ============================================================
        giscus 설정 방법:
        1. GitHub repo Settings → General → Features → Discussions 체크
        2. https://github.com/apps/giscus 에서 giscus 앱 설치
        3. https://giscus.app 에서 repo 입력 후 설정값 생성
        4. 아래 data-repo-id, data-category-id 값을 교체
        ============================================================
      -->
      <script src="https://giscus.app/client.js"
              data-repo="DJ-Kor/AAB-DJJ"
              data-repo-id="YOUR_REPO_ID"
              data-category="General"
              data-category-id="YOUR_CATEGORY_ID"
              data-mapping="pathname"
              data-strict="0"
              data-reactions-enabled="1"
              data-emit-metadata="0"
              data-input-position="top"
              data-theme="preferred_color_scheme"
              data-lang="ko"
              crossorigin="anonymous"
              async>
      </script>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner"></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
